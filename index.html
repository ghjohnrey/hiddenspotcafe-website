<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Spot Cafe – Potion Lab</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:radial-gradient(circle at top,#0a0a12,#050509 70%);
  color:#eaeaf0;
}

header{text-align:center;padding:60px 20px;}
h1{font-size:40px;margin-bottom:10px;}
.section{padding:40px 20px;text-align:center;}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:35px;
  max-width:1200px;
  margin:auto;
}

.card{
  position:relative;
  background:rgba(20,20,35,0.85);
  padding:20px;
  border-radius:18px;
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.05);
  transition:0.3s ease;
  overflow:hidden;
}
.card:hover{transform:translateY(-6px);}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#ff2e63;
  color:white;
  padding:5px 10px;
  font-size:12px;
  border-radius:20px;
}

.drink-img{
  width:140px;
  height:180px;
  object-fit:cover;
  border-radius:14px;
  transition:0.3s ease;
}

.price{font-weight:bold;margin-top:8px;color:#ffd369;}
.stock{font-size:13px;margin-top:5px;color:#aaa;}

.quantity{
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:10px;
  gap:10px;
}
.quantity button{
  background:#a855f7;
  border:none;
  color:white;
  width:28px;
  height:28px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}
.quantity span{min-width:20px;display:inline-block;}

.active img{box-shadow:0 0 30px #a855f7;}

.glitter{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  animation:floatUp 2s linear forwards;
}
@keyframes floatUp{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-80px);opacity:0;}
}

.cart-bar{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#111;
  padding:15px;
  text-align:center;
}
.cart-bar button{
  background:#a855f7;
  border:none;
  padding:12px 25px;
  border-radius:30px;
  color:white;
  cursor:pointer;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}
.modal-content{
  background:#1a1a2e;
  padding:30px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}
.modal input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}
.modal button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:20px;
  border:none;
  background:#a855f7;
  color:white;
  cursor:pointer;
}

.confirmation{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.admin-counter{
  text-align:center;
  margin-top:20px;
  font-size:14px;
  color:#aaa;
}

.map-section{margin:60px 0;}
iframe{
  width:100%;
  height:350px;
  border:none;
  border-radius:15px;
}

footer{
  text-align:center;
  padding:25px;
  margin-top:60px;
  color:#777;
}
</style>
</head>

<body>

<header>
  <h1>Hidden Spot Cafe</h1>
  <p>Tap to Transform – Elixir ₱39 | Potion ₱49 ✨</p>
</header>

<section class="section">
  <div class="products" id="productContainer"></div>
</section>

<div class="cart-bar">
  <span id="totalText">Total: ₱0</span>
  <button onclick="openCheckout()">Checkout</button>
</div>

<div class="modal" id="checkoutModal">
  <div class="modal-content">
    <h3>Your Details</h3>
    <input type="text" id="custName" placeholder="Your Name">
    <input type="tel" id="custPhone" placeholder="Phone Number">
    <button onclick="sendOrder()">Place Order</button>
    <button onclick="closeCheckout()">Cancel</button>
  </div>
</div>

<div class="confirmation" id="confirmation">
  <h2>✨ Order Sent Successfully! ✨</h2>
</div>

<div class="admin-counter">
  Total Orders Received: <span id="orderCount">0</span>
</div>

<section class="map-section">
  <h2 style="text-align:center;">Find Us Here</h2>
  <iframe src="https://www.google.com/maps?q=Hidden%20Spot%20Cafe&output=embed"></iframe>
</section>

<footer>
  © 2026 Hidden Spot Cafe
</footer>

<script>
const products=["love","sun","emerald","night","moon"];
const prices={elixir:39,potion:49};
let state={},inventory={},orderCount=localStorage.getItem("orders")||0;

document.getElementById("orderCount").innerText=orderCount;

const container=document.getElementById("productContainer");

products.forEach(id=>{
  state[id]="elixir";
  inventory[id]=20;

  const card=document.createElement("div");
  card.className="card";
  card.onclick=()=>togglePotion(card,id);

  card.innerHTML=`
    ${id==="love"?'<div class="badge">Best Seller</div>':''}
    <img src="${id}.png" class="drink-img">
    <h3>${capitalize(id)} Elixir</h3>
    <p class="price">₱39</p>
    <div class="stock" id="stock-${id}">Stock: 20</div>
    <div class="quantity">
      <button onclick="event.stopPropagation(); changeQty('${id}',-1)">-</button>
      <span id="${id}">0</span>
      <button onclick="event.stopPropagation(); changeQty('${id}',1)">+</button>
    </div>
  `;
  container.appendChild(card);
});

function capitalize(str){return str.charAt(0).toUpperCase()+str.slice(1);}

function togglePotion(card,id){
  const img=card.querySelector("img");
  const title=card.querySelector("h3");
  const price=card.querySelector(".price");

  if(state[id]==="elixir"){
    state[id]="potion";
    card.classList.add("active");
    img.src=id+"-potion.png";
    title.innerText=capitalize(id)+" Potion";
    price.innerText="₱49";
    startGlitter(card);
  }else{
    state[id]="elixir";
    card.classList.remove("active");
    img.src=id+".png";
    title.innerText=capitalize(id)+" Elixir";
    price.innerText="₱39";
  }
  updateTotal();
}

function startGlitter(card){
  for(let i=0;i<8;i++){
    const g=document.createElement("div");
    g.className="glitter";
    g.style.left=Math.random()*150+"px";
    g.style.bottom="20px";
    card.appendChild(g);
    setTimeout(()=>g.remove(),2000);
  }
}

function changeQty(id,amount){
  let qty=parseInt(document.getElementById(id).innerText);
  qty+=amount;
  if(qty<0)qty=0;
  if(qty>inventory[id]){alert("Not enough stock!");return;}
  document.getElementById(id).innerText=qty;
  updateTotal();
}

function updateTotal(){
  let total=0;
  products.forEach(id=>{
    let qty=parseInt(document.getElementById(id).innerText);
    total+=qty*prices[state[id]];
  });
  document.getElementById("totalText").innerText="Total: ₱"+total;
}

function openCheckout(){document.getElementById("checkoutModal").style.display="flex";}
function closeCheckout(){document.getElementById("checkoutModal").style.display="none";}

function sendOrder(){
  const name=document.getElementById("custName").value.trim();
  const phone=document.getElementById("custPhone").value.trim();
  if(!name||!phone){alert("Complete all fields");return;}

  let message="Hello Hidden Spot Cafe!\n\nOrder Details:\n";
  message+="Name: "+name+"\nPhone: "+phone+"\n\n";

  let total=0;
  products.forEach(id=>{
    let qty=parseInt(document.getElementById(id).innerText);
    if(qty>0){
      message+=qty+" "+capitalize(id)+" "+state[id]+"\n";
      total+=qty*prices[state[id]];
      inventory[id]-=qty;
      document.getElementById("stock-"+id).innerText="Stock: "+inventory[id];
      document.getElementById(id).innerText=0;
    }
  });

  if(total===0){alert("Select at least 1 item");return;}

  message+="\nTotal: ₱"+total;
  window.open("https://m.me/hiddenspotcafe?text="+encodeURIComponent(message),"_blank");

  orderCount++;
  localStorage.setItem("orders",orderCount);
  document.getElementById("orderCount").innerText=orderCount;

  document.getElementById("confirmation").style.display="flex";
  setTimeout(()=>document.getElementById("confirmation").style.display="none",2500);

  updateTotal();
  closeCheckout();
}
</script>

</body>
</html>
