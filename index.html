<!DOCTYPE html>
<html>
<head>
  <title>Hidden Spot – Potion Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0a0a12, #050509 70%);
  color: #eaeaf0;
}

header {
  text-align: center;
  padding: 60px 20px;
}

h1 { font-size: 40px; margin-bottom: 10px; }

.section {
  padding: 40px 20px;
  text-align: center;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 35px;
  max-width: 1000px;
  margin: auto;
}

.card {
  position: relative;
  background: rgba(20,20,35,0.8);
  padding: 20px;
  border-radius: 18px;
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: 0.3s ease;
  overflow: visible;
}

.card:hover { transform: translateY(-6px); }

.drink-img {
  width: 140px;
  height: 180px;
  object-fit: cover;
  border-radius: 14px;
  transition: 0.3s ease;
}

.card.morph img { transform: scale(1.15); opacity: 0; }

.love.active img { box-shadow: 0 0 35px #ff2e63; }
.sun.active img { box-shadow: 0 0 35px #ffb703; }
.emerald.active img { box-shadow: 0 0 35px #2ecc71; }
.night.active img { box-shadow: 0 0 35px #5a189a; }
.moon.active img { box-shadow: 0 0 35px #f8c8dc; }

.price { font-weight: bold; margin-top: 8px; color: #ffd369; }

.glitter {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  pointer-events: none;
  animation: floatUp 2s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-80px); opacity: 0; }
}

/* MAP SECTION */
.map-section {
  padding: 60px 20px;
  text-align: center;
}

.map-container {
  max-width: 900px;
  margin: auto;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(168,85,247,0.4);
}

.map-container iframe {
  width: 100%;
  height: 400px;
  border: 0;
}

/* Orb */
.chat-orb {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 75px;
  height: 75px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #ffffff, #a855f7 40%, #5a189a 70%);
  box-shadow: 0 0 20px #a855f7, 0 0 40px #7b2ff7;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  font-size: 30px;
  z-index: 999;
  animation: floatOrb 4s ease-in-out infinite;
  transition: 0.3s ease;
}

@keyframes floatOrb {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

.online-indicator {
  position: absolute;
  bottom: -5px;
  right: -5px;
  background: #00ff88;
  color: #000;
  font-size: 10px;
  padding: 4px 6px;
  border-radius: 10px;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 25px;
  margin-top: 40px;
  color: #777;
}
</style>
</head>

<body>

<header>
  <h1>Hidden Spot</h1>
  <p>Elixirs ₱39 | Upgrade to Potion ₱49 ✨</p>
</header>

<section class="section">
  <h2>Tap to Transform</h2>
  <div class="products">
    <!-- Keep your existing 5 cards here unchanged -->
  </div>
</section>

<!-- 📍 MAP SECTION -->
<section class="map-section">
  <h2>📍 Find Our Secret Spot</h2>
  <p>3rd Floor – Visit us daily 2:30PM – 6:30PM</p>

  <div class="map-container">
    <iframe
      src="<iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d574.1323279836208!2d121.05635209165193!3d14.525596024106317!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3397c93e69a8dde3%3A0xfa6b8d2653081f51!2sHidden%20Spot%20Cafe!5e0!3m2!1sen!2sph!4v1771863287407!5m2!1sen!2sph" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>"
      allowfullscreen=""
      loading="lazy">
    </iframe>
  </div>
</section>

<footer>
  © 2026 Hidden Spot – Potion Lab
</footer>

<a href="https://m.me/hiddenspotcafe" target="_blank" class="chat-orb" id="chatOrb">
  💬
  <div class="online-indicator">Online</div>
</a>

<script>
function togglePotion(card, baseName, potionName, baseDesc, potionDesc, baseImg, potionImg) {
  const img = card.querySelector("img");
  const title = card.querySelector("h3");
  const desc = card.querySelector(".desc");
  const price = card.querySelector(".price");

  card.classList.add("morph");

  setTimeout(() => {
    if (!card.classList.contains("active")) {
      card.classList.add("active");
      img.src = potionImg;
      title.innerText = potionName;
      desc.innerText = potionDesc;
      price.innerText = "₱49";
    } else {
      card.classList.remove("active");
      img.src = baseImg;
      title.innerText = baseName;
      desc.innerText = baseDesc;
      price.innerText = "₱39";
    }
    card.classList.remove("morph");
  }, 200);
}
</script>

</body>
</html>
